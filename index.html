```html
<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebStudio - Homework 5</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Raleway:wght@700&family=Roboto:wght@400;500;700&display=swap"
      rel="stylesheet"
    />

    <!-- Normalize -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/modern-normalize/2.0.0/modern-normalize.min.css"
    />

    <!-- Styles -->
    <link rel="stylesheet" href="./css/styles.css" />
  </head>

  <body>
    <!-- HEADER -->
    <header class="header">
      <div class="container header-container">
        <nav class="nav">
          <a href="./index.html" class="logo header-logo">
            Web<span class="logo-dark">Studio</span>
          </a>
        </nav>
      </div>
    </header>

    <!-- MAIN -->
    <main>
      <section class="hero">
        <div class="container">
          <button class="btn hero-btn" type="button">Order Service</button>
        </div>
      </section>
    </main>

    <!-- FOOTER -->
    <footer class="footer">
      <div class="container footer-container">
        <!-- LOGO + TEXT -->
        <div class="footer-info">
          <a href="./index.html" class="logo footer-logo">
            Web<span class="logo-light">Studio</span>
          </a>
          <p class="footer-text">
            Increase the flow of customers and sales for your business with
            digital marketing & growth solutions.
          </p>
        </div>

        <!-- SOCIAL -->
        <div class="footer-social">
          <p class="footer-title">Social media</p>
          <ul class="footer-social-list">
            <li>
              <a href="" class="footer-social-link">
                <svg width="24" height="24">
                  <use href="./images/icons.svg#icon-instagram"></use>
                </svg>
              </a>
            </li>
            <li>
              <a href="" class="footer-social-link">
                <svg width="24" height="24">
                  <use href="./images/icons.svg#icon-twitter"></use>
                </svg>
              </a>
            </li>
            <li>
              <a href="" class="footer-social-link">
                <svg width="24" height="24">
                  <use href="./images/icons.svg#icon-facebook"></use>
                </svg>
              </a>
            </li>
            <li>
              <a href="" class="footer-social-link">
                <svg width="24" height="24">
                  <use href="./images/icons.svg#icon-linkedin"></use>
                </svg>
              </a>
            </li>
          </ul>
        </div>

        <!-- SUBSCRIBE -->
        <div class="footer-subscribe">
          <p class="footer-title">Subscribe</p>
          <form class="subscribe-form">
            <input
              type="email"
              name="footer-email"
              class="subscribe-input"
              placeholder="E-mail"
              required
            />
            <button type="submit" class="subscribe-btn">
              Subscribe
              <svg width="24" height="24">
                <use href="./images/icons.svg#icon-send"></use>
              </svg>
            </button>
          </form>
        </div>
      </div>
    </footer>

    <!-- MODAL -->
    <div class="backdrop" data-modal>
      <div class="modal">
        <button class="close-btn" type="button" data-modal-close>
          <svg width="8" height="8">
            <use href="./images/icons.svg#close"></use>
          </svg>
        </button>

        <p class="modal-title">Leave your contacts and we will call you back</p>

        <form class="modal-form">
          <!-- NAME -->
          <div class="modal-field">
            <label class="modal-label">Name</label>
            <div class="input-wrap">
              <input type="text" class="modal-input" required />
              <svg class="input-icon" width="18" height="24">
                <use href="./images/icons.svg#person"></use>
              </svg>
            </div>
          </div>

          <!-- PHONE -->
          <div class="modal-field">
            <label class="modal-label">Phone</label>
            <div class="input-wrap">
              <input type="tel" class="modal-input" required />
              <svg class="input-icon" width="18" height="24">
                <use href="./images/icons.svg#phone"></use>
              </svg>
            </div>
          </div>

          <!-- EMAIL -->
          <div class="modal-field">
            <label class="modal-label">Email</label>
            <div class="input-wrap">
              <input type="email" class="modal-input" required />
              <svg class="input-icon" width="18" height="24">
                <use href="./images/icons.svg#icon-send"></use>
              </svg>
            </div>
          </div>

          <!-- COMMENT -->
          <div class="modal-field-comment">
            <label class="modal-label">Comment</label>
            <textarea
              class="modal-textarea"
              placeholder="Text input"
            ></textarea>
          </div>

          <!-- POLICY -->
          <div class="modal-field-policy">
            <input
              type="checkbox"
              class="checkbox visually-hidden"
              id="policy"
            />
            <label for="policy" class="policy-label">
              <span class="custom-check">
                <svg width="10" height="8">
                  <use href="./images/icons.svg#check"></use>
                </svg>
              </span>
              I accept the
              <a href="" class="policy-link">Privacy Policy</a>
            </label>
          </div>

          <!-- SUBMIT -->
          <button type="submit" class="submit-btn">Send</button>
        </form>
      </div>
    </div>
  </body>
</html>
```
