<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project - Homework 5</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/modern-normalize/2.0.0/modern-normalize.min.css"
    />
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <header class="header">
      <div class="container">
        <h1>Website</h1>
      </div>
    </header>

    <main>
      <section class="hero">
        <div class="container">
          <button class="btn open-modal-btn" type="button">
            Відкрити форму
          </button>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="container">
        <p class="footer-form-title">Підписка</p>
        <form class="subscribe-form">
          <label class="subscribe-label">
            <input
              type="email"
              name="footer-email"
              class="subscribe-input"
              placeholder="E-mail"
              required
            />
          </label>
          <button type="submit" class="btn subscribe-btn">
            Підписатись
            <svg class="subscribe-icon" width="24" height="24">
              <use href="./images/icons.svg#icon-send"></use>
            </svg>
          </button>
        </form>
      </div>
    </footer>

    <div class="backdrop" data-modal>
      <div class="modal">
        <button class="close-btn" type="button" data-modal-close>
          <svg width="8" height="8">
            <use href="./images/icons.svg#close"></use>
          </svg>
        </button>

        <p class="modal-title">Залиште свої контакти та ми вам передзвонимо</p>

        <form class="modal-form">
          <div class="modal-field">
            <label for="user-name" class="modal-label">Ім'я</label>
            <div class="input-wrap">
              <input
                type="text"
                name="user-name"
                id="user-name"
                class="modal-input"
                required
              />
              <svg class="input-icon" width="18" height="24">
                <use href="./images/icons.svg#person"></use>
              </svg>
            </div>
          </div>

          <div class="modal-field">
            <label for="user-tel" class="modal-label">Телефон</label>
            <div class="input-wrap">
              <input
                type="tel"
                name="user-phone"
                id="user-tel"
                class="modal-input"
                required
              />
              <svg class="input-icon" width="18" height="24">
                <use href="./images/icons.svg#phone"></use>
              </svg>
            </div>
          </div>

          <div class="modal-field-comment">
            <label for="user-comment" class="modal-label">Коментар</label>
            <textarea
              name="user-comment"
              id="user-comment"
              class="modal-textarea"
              placeholder="Введіть текст"
            ></textarea>
          </div>

          <div class="modal-field-policy">
            <input
              type="checkbox"
              name="user-privacy"
              id="user-privacy"
              value="true"
              class="checkbox visually-hidden"
              required
            />
            <label for="user-privacy" class="policy-label">
              <span class="custom-check">
                <svg width="10" height="8">
                  <use href="./images/icons.svg#check"></use>
                </svg>
              </span>
              Я приймаю умови&nbsp;<a href="" class="policy-link"
                >Політики конфіденційності</a
              >
            </label>
          </div>

          <button type="submit" class="btn submit-btn">Відправити</button>
        </form>
      </div>
    </div>
  </body>
</html>
