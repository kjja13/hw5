<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project</title>

    <!-- modern-normalize -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/modern-normalize/2.0.0/modern-normalize.min.css"
    />

    <link rel="stylesheet" href="css/styles.css" />
  </head>

  <body>
    <header class="header">
      <h1>Website</h1>
    </header>

    <main>
      <section class="content">
        <p>Контент з макета...</p>

        <!-- кнопка відкриття модалки -->
        <button class="btn" type="button">Відкрити форму</button>
      </section>
    </main>

    <footer class="footer">
      <form class="subscribe-form">
        <label class="label">
          Підписка
          <input type="email" name="email" placeholder="Введіть email" />
        </label>

        <button type="submit" class="btn">Підписатись</button>
      </form>
    </footer>

    <!-- BACKDROP + MODAL (після футера) -->
    <div class="backdrop">
      <div class="modal">
        <button class="close-btn" type="button">
          <svg width="18" height="18">
            <use href="icons.svg#close"></use>
          </svg>
        </button>

        <h2>Заявка</h2>

        <form class="modal-form">
          <label>
            Ім'я
            <input type="text" name="username" placeholder="Ваше ім'я" />
          </label>

          <label>
            Телефон
            <input type="tel" name="phone" placeholder="+380..." />
          </label>

          <label>
            Коментар
            <textarea name="comment" placeholder="Ваш коментар"></textarea>
          </label>

          <label class="checkbox">
            <input type="checkbox" name="policy" />
            <span class="custom-check">
              <svg width="12" height="12">
                <use href="icons.svg#check"></use>
              </svg>
            </span>
            Погоджуюсь з умовами
          </label>

          <button type="submit" class="btn">Відправити</button>
        </form>
      </div>
    </div>
  </body>
</html>
